    // Indian numbering rupees conversion
    const numberToWords = (num) => {
      const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
      const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];

      const numToWordsLessThanThousand = (n) => {
        let str = '';
        if (n >= 100) {
          str += a[Math.floor(n / 100)] + 'Hundred ';
          n %= 100;
          if (n > 0) str += 'and ';
        }
        if (n >= 20) {
          str += b[Math.floor(n / 10)] + ' ';
          n %= 10;
        }
        if (n > 0) {
          str += a[n];
        }
        return str;
      };

      if (num === 0) return 'Zero Rupees Only';

      let words = '';
      const crore = Math.floor(num / 10000000);
      num %= 10000000;
      const lakh = Math.floor(num / 100000);
      num %= 100000;
      const thousand = Math.floor(num / 1000);
      num %= 1000;
      const remaining = num;

      if (crore > 0) {
        words += numToWordsLessThanThousand(crore) + 'Crore ';
      }
      if (lakh > 0) {
        words += numToWordsLessThanThousand(lakh) + 'Lakh ';
      }
      if (thousand > 0) {
        words += numToWordsLessThanThousand(thousand) + 'Thousand ';
      }
      if (remaining > 0) {
        words += numToWordsLessThanThousand(remaining);
      }

      return words.trim() + ' Rupees Only';
    };

          { id: 'campaigns', label: 'Campaigns', icon: Megaphone },
          { id: 'content', label: 'Content', icon: CalendarDays },
          { id: 'assets', label: 'Assets', icon: Image },
        ]},
        { label: 'GROW', items: [
          { id: 'retention', label: 'Retention', icon: Heart },
          { id: 'reports', label: 'Reports', icon: BarChart3 },
        ]},
        { label: 'OPS', items: [
          { id: 'automation', label: 'Automation', icon: Zap },
        ]},
      ];

      // Stub component for Coming Soon modules
      const ComingSoonView = ({ title }) => (
        <Card className="p-12 text-center">
          <div className="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <Settings className="text-slate-400" size={28} />
          </div>
          <h2 className="text-xl font-bold text-slate-900 mb-2">{title}</h2>
          <p className="text-slate-500 text-sm">This module is coming soon in a future update.</p>
        </Card>
      );

      const renderView = () => {
        if (selectedInvoiceId) return <InvoiceDetailView invoiceId={selectedInvoiceId} invoices={invoices} setInvoices={setInvoices} clients={clients} onBack={() => setSelectedInvoiceId(null)} />;
        if (selectedQuoteId) return <QuoteDetailView quoteId={selectedQuoteId} quotes={quotes} setQuotes={setQuotes} clients={clients} invoices={invoices} setInvoices={setInvoices} onBack={() => setSelectedQuoteId(null)} />;
        if (selectedProjectId) return <ProjectDetailView projectId={selectedProjectId} projects={projects} setProjects={setProjects} clients={clients} tasks={tasks} setTasks={setTasks} onBack={() => setSelectedProjectId(null)} />;
        if (selectedCampaignId) return <CampaignDetailView campaignId={selectedCampaignId} campaigns={campaigns} setCampaigns={setCampaigns} clients={clients} onBack={() => setSelectedCampaignId(null)} />;
        
        switch (currentRoute) {
          case 'dashboard': return <DashboardView invoices={invoices} leads={leads} tasks={tasks} setTasks={setTasks} />;
          case 'leads': return <LeadsView leads={leads} setLeads={setLeads} />;
          case 'clients': return <ClientsView clients={clients} setClients={setClients} />;
          case 'quotes': return <QuotesView quotes={quotes} setQuotes={setQuotes} clients={clients} onSelectQuote={setSelectedQuoteId} />;
          case 'invoices': return <InvoicesView invoices={invoices} clients={clients} onSelectInvoice={setSelectedInvoiceId} />;
          case 'projects': return <ProjectsView projects={projects} setProjects={setProjects} clients={clients} onSelectProject={setSelectedProjectId} />;
          case 'tasks': return <TasksView tasks={tasks} setTasks={setTasks} />;
          case 'reports': return <ReportsView invoices={invoices} leads={leads} projects={projects} quotes={quotes} />;
          case 'funnel': return <FunnelView leads={leads} />;
          case 'team': return <ComingSoonView title="Team Management" />;
          case 'campaigns': return <CampaignsView campaigns={campaigns} setCampaigns={setCampaigns} clients={clients} onSelectCampaign={setSelectedCampaignId} />;
          case 'content': return <ContentView contentItems={contentItems} setContentItems={setContentItems} />;
          case 'assets': return <ComingSoonView title="Asset Library" />;
          case 'retention': return <ComingSoonView title="Client Retention" />;
          case 'automation': return <ComingSoonView title="Automation Engine" />;
          default: return <DashboardView invoices={invoices} leads={leads} tasks={tasks} setTasks={setTasks} />;
        }
      };

      // Search functionality
      const getSearchResults = () => {
        if (!searchQuery.trim()) return [];
        const q = searchQuery.toLowerCase();
        const results = [];
        clients.filter(c => c.company.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)).slice(0, 3).forEach(c => results.push({ type: 'Client', label: c.company, sub: c.name, route: 'clients' }));
        leads.filter(l => l.name.toLowerCase().includes(q)).slice(0, 3).forEach(l => results.push({ type: 'Lead', label: l.name, sub: l.stage, route: 'leads' }));
        quotes.filter(qx => `QT-${qx.id}`.toLowerCase().includes(q)).slice(0, 3).forEach(qx => results.push({ type: 'Quote', label: `QT-${qx.id}`, sub: formatINR(qx.total), route: 'quotes' }));
        invoices.filter(inv => `INV-${inv.id}`.toLowerCase().includes(q)).slice(0, 3).forEach(inv => results.push({ type: 'Invoice', label: `INV-${inv.id}`, sub: formatINR(inv.total), route: 'invoices' }));
        return results;
      };
      const searchResults = getSearchResults();

      // Render sidebar nav groups
      const renderNavGroups = (isMobile = false) => (
        <div className={`${isMobile ? 'p-4 space-y-3' : 'p-3 flex-1 overflow-y-auto space-y-3 custom-scrollbar'}`}>
          {navGroups.map(group => (
            <div key={group.label}>
              <div className="px-3 mb-1">
                <span className="text-[10px] uppercase tracking-widest font-bold text-slate-400">{group.label}</span>
              </div>
              <div className="space-y-0.5">
                {group.items.map(item => (
                  <button key={item.id} onClick={() => navigate(item.id)}
                    className={`w-full flex items-center px-3 py-2 text-sm font-medium rounded-lg transition-colors ${
                      currentRoute === item.id ? 'bg-slate-100 text-slate-900' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'
                    }`}>
                    <item.icon className={`mr-3 ${currentRoute === item.id ? 'text-slate-900' : 'text-slate-400'}`} size={18} />
                    {item.label}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      );

      return (
        <div className="flex h-screen bg-[#F8FAFC] font-sans text-slate-900 overflow-hidden">
          {/* SIDEBAR (Desktop) */}
          <aside className="hidden md:flex w-64 bg-white border-r border-slate-200 flex-col z-20 no-print">
            <div className="h-16 flex items-center px-6 border-b border-slate-100">
              <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center mr-3">
                <span className="text-white font-bold text-lg">T</span>
              </div>
              <span className="font-bold text-lg tracking-tight">TAGVERSE</span>
            </div>
            {renderNavGroups()}
            <div className="p-4 border-t border-slate-100">
              <div className="flex items-center px-2 justify-between">
                <div className="flex items-center overflow-hidden">
                  <Avatar name={currentUser.initial} className="w-8 h-8 mr-3 shrink-0" />
                  <div className="flex-1 overflow-hidden">
                    <div className="text-sm font-medium truncate">{currentUser.name}</div>
                    <div className="text-[10px] uppercase tracking-wider font-semibold text-slate-500 truncate">{currentUser.role}</div>
                  </div>
                </div>
                <button onClick={handleLogout} className="text-slate-400 hover:text-red-600 p-2 shrink-0 transition-colors font-medium" title="Logout">
                  <LogOut size={16} />
                </button>
              </div>
            </div>
          </aside>

          {/* MOBILE SHELL */}
          <div className="md:hidden fixed inset-0 z-40 bg-slate-900/50 backdrop-blur-sm no-print" style={{ display: isMobileMenuOpen ? 'block' : 'none' }} onClick={() => setIsMobileMenuOpen(false)} />
          <aside className={`md:hidden fixed inset-y-0 left-0 z-50 w-64 bg-white transform transition-transform duration-300 ease-in-out ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} no-print`}>
            <div className="h-16 flex items-center justify-between px-6 border-b border-slate-100">
              <span className="font-bold text-lg">TAGVERSE</span>
              <button onClick={() => setIsMobileMenuOpen(false)}><X size={20}/></button>
            </div>
            {renderNavGroups(true)}
          </aside>

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 flex flex-col h-screen overflow-hidden">
            {/* TOPBAR */}
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 shrink-0 no-print">
              <div className="flex items-center">
                <button className="md:hidden mr-4 text-slate-600" onClick={() => setIsMobileMenuOpen(true)}>
                  <Menu size={24} />
                </button>
                <h1 className="text-xl font-semibold capitalize text-slate-900">
                  {selectedInvoiceId ? 'Invoice Detail' : selectedQuoteId ? 'Quotation Detail' : currentRoute.replace('_', ' ')}
                </h1>
              </div>
              <div className="flex items-center gap-4">
                <div className="relative hidden md:block">
                  <Search className="absolute left-2.5 top-2.5 text-slate-400 z-10" size={16} />
                  <Input 
                    placeholder="Search..." 
                    className="pl-9 w-64 bg-slate-50 border-transparent" 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    onBlur={() => setTimeout(() => setSearchQuery(''), 200)}
                  />
                  {searchResults.length > 0 && (
                    <div className="absolute top-11 left-0 w-80 bg-white border border-slate-200 rounded-xl shadow-xl z-50 overflow-hidden">
                      {searchResults.map((r, idx) => (
                        <button key={idx} className="w-full text-left px-4 py-3 hover:bg-slate-50 flex items-center justify-between border-b border-slate-100 last:border-0 transition-colors"
                          onMouseDown={() => { navigate(r.route); setSearchQuery(''); }}>
                          <div>
                            <span className="text-sm font-semibold text-slate-900">{r.label}</span>
                            <span className="text-xs text-slate-500 ml-2">{r.sub}</span>
                          </div>
                          <Badge variant="default" className="text-[10px]">{r.type}</Badge>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
                <button className="text-slate-400 hover:text-slate-600" onClick={() => alert("Settings configuration coming soon")} title="Settings">
                  <Settings size={20} />
                </button>
                <div className="md:hidden flex items-center gap-3">
                  <Avatar name={currentUser.initial} className="w-8 h-8" />
                  <button onClick={handleLogout} className="text-slate-400 hover:text-red-500">
                    <LogOut size={18} />
                  </button>
                </div>
              </div>
            </header>

            {/* PAGE CONTENT */}
            <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
              <div className="max-w-6xl mx-auto pb-12">
                {renderView()}
              </div>
            </div>
          </main>
        </div>
      );
    }

    // ============================================================================
    // 4. DASHBOARD PAGE
    // ============================================================================

    function DashboardView({ invoices, leads, tasks, setTasks }) {
      const collected = invoices.filter(i => i.status === 'paid').reduce((sum, i) => sum + i.total, 0);
      const outstanding = invoices.filter(i => i.status === 'pending' || i.status === 'overdue').reduce((sum, i) => sum + i.total, 0);
      const openLeads = leads.filter(l => l.stage !== 'lost' && l.stage !== 'won').length;
      
      const todayTasks = tasks.filter(t => t.dueDate === TODAY);

      const toggleTask = (id) => {
        const updated = tasks.map(t => t.id === id ? { ...t, status: t.status === 'done' ? 'todo' : 'done' } : t);
        setTasks(updated);
      };

      const getStatusBadge = (status) => {
        const map = { paid: 'success', pending: 'warning', overdue: 'danger' };
        return <Badge variant={map[status] || 'default'} className="uppercase text-[10px]">{status}</Badge>;
      };

      return (
        <div className="space-y-6">
          {/* Metric Cards */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <MetricCard title="Revenue Collected" value={formatINR(collected)} icon={DollarSign} />
            <MetricCard title="Outstanding Bills" value={formatINR(outstanding)} icon={AlertCircle} />
            <MetricCard title="Open Leads" value={openLeads} icon={Users} />
            <MetricCard title="Tasks Due Today" value={todayTasks.length} icon={Clock} />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* Pipeline Bars */}
            <Card className="lg:col-span-1 p-6 flex flex-col">
              <h3 className="font-semibold text-slate-900 mb-6">Sales Pipeline</h3>
              <div className="space-y-5 flex-1">
                {['lead', 'qualified', 'proposal', 'won'].map(stage => {
                  const count = leads.filter(l => l.stage === stage).length;
                  const percent = Math.round((count / Math.max(leads.length, 1)) * 100);
                  return (
                    <div key={stage} className="space-y-2">
                      <div className="flex justify-between text-sm">
                        <span className="capitalize font-medium text-slate-700">{stage}</span>
                        <span className="text-slate-500">{count}</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-2">
                        <div className="bg-slate-900 h-2 rounded-full transition-all duration-500" style={{ width: `${percent}%` }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>

            {/* Recent Invoices */}
            <Card className="lg:col-span-2 p-0 overflow-hidden flex flex-col">
              <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 className="font-semibold text-slate-900">Recent Invoices</h3>
                <Button variant="ghost" size="sm">View All</Button>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="bg-slate-50 text-slate-500">
                    <tr>
                      <th className="px-6 py-3 font-medium">Invoice</th>
                      <th className="px-6 py-3 font-medium">Amount</th>
                      <th className="px-6 py-3 font-medium">Status</th>
                      <th className="px-6 py-3 font-medium">Due Date</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {invoices.map(inv => (
                      <tr key={inv.id} className="hover:bg-slate-50/50">
                        <td className="px-6 py-4 font-semibold text-slate-900">INV-{inv.id}</td>
                        <td className="px-6 py-4 text-slate-700 font-medium">{formatINR(inv.total)}</td>
                        <td className="px-6 py-4">{getStatusBadge(inv.status)}</td>
                        <td className="px-6 py-4 text-slate-500">{formatDate(inv.dueDate)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          </div>

          {/* Today's Tasks */}
          <Card className="p-6">
            <h3 className="font-semibold text-slate-900 mb-4 flex items-center">
              <CheckSquare className="mr-2 text-slate-400" size={18} /> Today's Tasks
            </h3>
            <div className="space-y-3">
              {todayTasks.map(task => (
                <div key={task.id} className={`flex items-center p-3 rounded-lg border ${task.status === 'done' ? 'bg-slate-50 border-transparent opacity-60' : 'bg-white border-slate-200'}`}>
                  <button 
                    onClick={() => toggleTask(task.id)}
                    className={`w-5 h-5 rounded border flex items-center justify-center mr-3 transition-colors ${task.status === 'done' ? 'bg-slate-900 border-slate-900 text-white' : 'border-slate-300 text-transparent'}`}
                  >
                    <Check size={14} />
                  </button>
                  <span className={`text-sm flex-1 ${task.status === 'done' ? 'line-through text-slate-500' : 'text-slate-900 font-medium'}`}>{task.title}</span>
                  <Avatar name={task.assignee} className="w-6 h-6 text-[10px]" />
                </div>
              ))}
              {todayTasks.length === 0 && <p className="text-sm text-slate-500 italic">No tasks due today.</p>}
            </div>
          </Card>
        </div>
      );
    }

    function MetricCard({ title, value, icon: Icon }) {
      return (
        <Card className="p-6 flex flex-col justify-between">
          <div className="flex justify-between items-start mb-4">
            <p className="text-sm font-medium text-slate-500">{title}</p>
            <div className="p-2 bg-slate-50 rounded-lg text-slate-600"><Icon size={18} /></div>
          </div>
          <p className="text-2xl font-bold text-slate-900">{value}</p>
        </Card>
      );
    }

    // ============================================================================
    // 5. LEADS PAGE (Kanban)
    // ============================================================================

    function LeadsView({ leads, setLeads }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [form, setForm] = useState({ name: '', source: 'web', score: 50 });
      const columns = ['lead', 'qualified', 'proposal', 'won', 'lost'];

      const handleDragStart = (e, id) => {
        e.dataTransfer.setData('leadId', id);
      };

      const handleDrop = (e, stage) => {
        e.preventDefault();
        const id = parseInt(e.dataTransfer.getData('leadId'));
        setLeads(leads.map(l => l.id === id ? { ...l, stage } : l));
      };

      const handleAdd = (e) => {
        e.preventDefault();
        setLeads([...leads, { ...form, id: Date.now(), stage: 'lead' }]);
        setIsModalOpen(false);
        setForm({ name: '', source: 'web', score: 50 });
      };

      const borderColors = { lead: 'border-slate-300', qualified: 'border-blue-400', proposal: 'border-amber-400', won: 'border-emerald-500', lost: 'border-red-400' };
      const badgeColors = { won: 'success', lost: 'danger', proposal: 'warning' };

      return (
        <div className="h-full flex flex-col">
          <div className="flex justify-between items-center mb-6">
            <p className="text-slate-500 text-sm hidden md:block">Drag and drop leads to update their pipeline stage.</p>
            <Button onClick={() => setIsModalOpen(true)} className="ml-auto"><Plus size={16} className="mr-2" /> Add Lead</Button>
          </div>

          <div className="flex-1 flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
            {columns.map(stage => (
              <div 
                key={stage} 
                className="flex-shrink-0 w-72 bg-slate-100/50 rounded-xl p-3 flex flex-col"
                onDragOver={(e) => e.preventDefault()}
                onDrop={(e) => handleDrop(e, stage)}
              >
                <div className="flex justify-between items-center mb-4 px-1">
                  <h3 className="font-semibold text-sm text-slate-700 capitalize">{stage}</h3>
                  <span className="bg-slate-200 text-slate-600 text-xs px-2 py-0.5 rounded-full font-medium">
                    {leads.filter(l => l.stage === stage).length}
                  </span>
                </div>
                <div className="flex-1 space-y-3 overflow-y-auto min-h-[150px] custom-scrollbar">
                  {leads.filter(l => l.stage === stage).map(lead => (
                    <Card 
                      key={lead.id} 
                      className={`p-4 cursor-grab active:cursor-grabbing border-l-4 ${borderColors[stage]}`}
                      draggable
                      onDragStart={(e) => handleDragStart(e, lead.id)}
                    >
                      <div className="flex justify-between items-start mb-2">
                        <h4 className="font-semibold text-slate-900 text-sm">{lead.name}</h4>
                        <GripVertical size={14} className="text-slate-300 cursor-grab" />
                      </div>
                      <div className="flex justify-between items-center mt-4">
                        <Badge variant={badgeColors[stage] || 'default'} className="text-[10px] capitalize">{lead.source}</Badge>
                        <div className="flex items-center text-xs font-medium text-slate-500">
                          Score: <span className={`ml-1 font-bold ${lead.score > 80 ? 'text-emerald-600' : ''}`}>{lead.score}</span>
                        </div>
                      </div>
                    </Card>
                  ))}
                </div>
              </div>
            ))}
          </div>

          <Dialog isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Add New Lead">
            <form onSubmit={handleAdd} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Company / Name</label>
                <Input required value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="e.g. Wayne Enterprises" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Source</label>
                  <Select value={form.source} onChange={e => setForm({...form, source: e.target.value})}>
                    <option value="web">Web Form</option>
                    <option value="referral">Referral</option>
                    <option value="instagram">Instagram</option>
                    <option value="whatsapp">WhatsApp</option>
                  </Select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">Lead Score</label>
                  <Input type="number" min="0" max="100" required value={form.score} onChange={e => setForm({...form, score: parseInt(e.target.value) || 0})} />
                </div>
              </div>
              <div className="pt-4 flex justify-end gap-3">
                <Button type="button" variant="ghost" onClick={() => setIsModalOpen(false)}>Cancel</Button>
                <Button type="submit">Create Lead</Button>
              </div>
            </form>
          </Dialog>
        </div>
      );
    }

    // ============================================================================
    // 6. CLIENTS PAGE
    // ============================================================================

    function ClientsView({ clients, setClients }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [clientSearch, setClientSearch] = useState('');
      const [form, setForm] = useState({ name: '', company: '', email: '', phone: '', status: 'active' });

      const handleAdd = (e) => {
        e.preventDefault();
        setClients([...clients, { ...form, id: Date.now() }]);
        setIsModalOpen(false);
        setForm({ name: '', company: '', email: '', phone: '', status: 'active' });
      };

      const handleDelete = (id) => {
        if (confirm("Are you sure you want to delete this client?")) {
          setClients(clients.filter(c => c.id !== id));
        }
      };

      const filteredClients = clients.filter(c => 
        c.company.toLowerCase().includes(clientSearch.toLowerCase()) || 
        c.name.toLowerCase().includes(clientSearch.toLowerCase())
      );

      return (
        <div className="space-y-6">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div className="relative w-full sm:w-64">
              <Search className="absolute left-2.5 top-2.5 text-slate-400" size={16} />
              <Input 
                placeholder="Search clients..." 
                value={clientSearch}
                onChange={(e) => setClientSearch(e.target.value)}
                className="pl-9 bg-white" 
              />
            </div>
            <Button onClick={() => setIsModalOpen(true)} className="sm:ml-auto"><Plus size={16} className="mr-2" /> Add Client</Button>
          </div>

          <Card className="overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-slate-50 text-slate-500">
                  <tr>
                    <th className="px-6 py-3 font-medium">Company</th>
                    <th className="px-6 py-3 font-medium">Contact Person</th>
                    <th className="px-6 py-3 font-medium">Status</th>
                    <th className="px-6 py-3 font-medium text-right">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {filteredClients.map(c => (
                    <tr key={c.id} className="hover:bg-slate-50/50 transition-colors">
                      <td className="px-6 py-4 font-semibold text-slate-900">{c.company}</td>
                      <td className="px-6 py-4">
                        <div className="text-slate-900 font-medium">{c.name}</div>
                        <div className="flex items-center gap-3 mt-1">
                          <a href={getEmailLink(c.email, `Hi ${c.name},`, '')} className="flex items-center text-xs text-slate-500 hover:text-blue-600 transition-colors" title="Send Email">
                            <Mail size={12} className="mr-1"/> {c.email}
                          </a>
                          <a href={getWhatsAppLink(c.phone, `Hi ${c.name},`)} target="_blank" rel="noreferrer" className="flex items-center text-xs text-slate-500 hover:text-green-600 transition-colors" title="Send WhatsApp">
                            <MessageCircle size={12} className="mr-1"/> {c.phone}
                          </a>
                        </div>
                      </td>
                      <td className="px-6 py-4">
                        <Badge variant={c.status === 'active' ? 'success' : 'default'} className="capitalize">{c.status}</Badge>
                      </td>
                      <td className="px-6 py-4 text-right">
                        <button onClick={() => handleDelete(c.id)} className="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all" title="Delete Client">

    function QuotesView({ quotes, setQuotes, clients, onSelectQuote }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editId, setEditId] = useState(null);
      const [form, setForm] = useState({ clientId: '', items: [{ name: '', qty: 1, rate: 0 }] });

      const getSubtotal = () => form.items.reduce((sum, item) => sum + (item.qty * item.rate), 0);
      const getGST = () => getSubtotal() * 0.18;
      const getTotal = () => getSubtotal() + getGST();

      const updateItem = (index, field, value) => {
        const newItems = form.items.map((item, i) =>
          i === index ? { ...item, [field]: field === 'name' ? value : Number(value) } : item
        );
        setForm({ ...form, items: newItems });
      };

      const handleSave = (e) => {
        e.preventDefault();
        if(!form.clientId) return alert("Select a client");
        
        if (editId !== null) {
          setQuotes(quotes.map(q => 
            q.id === editId 
              ? { ...q, clientId: parseInt(form.clientId), total: getTotal(), items: form.items }
              : q
          ));
        } else {
          setQuotes([{
            id: Date.now(),
            clientId: parseInt(form.clientId),
            total: getTotal(),
            status: 'draft',
            date: new Date().toISOString().split('T')[0],
            items: form.items
          }, ...quotes]);
        }
        
        handleCloseModal();
      };

      const handleCloseModal = () => {
        setEditId(null);
        setIsModalOpen(false);
        setForm({ clientId: '', items: [{ name: '', qty: 1, rate: 0 }] });
      };

      const getBadge = (status) => {
        const map = { approved: 'success', sent: 'info', draft: 'default', rejected: 'danger' };
        return <Badge variant={map[status]} className="capitalize">{status}</Badge>;

        <div className="space-y-6">

    function SignatureModal({ isOpen, onClose, onSubmit, quoteId }) {
      const canvasRef = React.useRef(null);
      const [hasDrawn, setHasDrawn] = useState(false);
      const [tab, setTab] = useState('draw'); // 'draw' | 'type'
      const [signerName, setSignerName] = useState('');
      const [typedName, setTypedName] = useState('');
      const [isDrawing, setIsDrawing] = useState(false);

      const getCanvasCoords = (e, canvas) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
        const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
        return {
          x: ((clientX - rect.left) / rect.width) * canvas.width,
          y: ((clientY - rect.top) / rect.height) * canvas.height
        };
      };

      const handleStart = (e) => {
        e.preventDefault();
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        // Ensure styles are set on drawing start
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#111';

        const coords = getCanvasCoords(e, canvas);
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
        setIsDrawing(true);
      };

      const handleMove = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const coords = getCanvasCoords(e, canvas);
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
        setHasDrawn(true);
      };

      const handleEnd = () => {
        setIsDrawing(false);
      };

      const handleClear = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        setHasDrawn(false);
      };

      useEffect(() => {
        const canvas = canvasRef.current;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.lineWidth = 2.5;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.strokeStyle = '#111';
        }
      }, [tab, isOpen]);

      const handleFormSubmit = (e) => {
        e.preventDefault();
        if (!signerName.trim()) {
          alert("Signer Name is required.");
          return;
        }

        let signature = '';
        if (tab === 'draw') {
          if (!hasDrawn) {
            alert("Please draw your signature.");
            return;
          }
          const canvas = canvasRef.current;
          signature = canvas.toDataURL('image/png');
        } else {
          if (!typedName.trim()) {
            alert("Please type your signature.");
            return;
          }
          signature = typedName.trim();
        }

        const timestamp = new Date().toISOString();
        const verificationHash = btoa(unescape(encodeURIComponent(signerName + timestamp))).replace(/[^A-Z0-9]/gi, '').slice(-12).toUpperCase();

        onSubmit({
          signature,
          signatureType: tab === 'draw' ? 'drawn' : 'typed',
          signerName: signerName.trim(),
          verificationHash,
          signedAt: timestamp
        });
      };

      return (
        <Dialog isOpen={isOpen} onClose={onClose} title={`Digitally Sign Quotation QT-${quoteId}`} maxWidth="max-w-md">
          <form onSubmit={handleFormSubmit} className="space-y-4">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Signer Name *</label>
              <Input required value={signerName} onChange={e => setSignerName(e.target.value)} placeholder="e.g. Sarah Jane" />
            </div>

            <div className="border-b border-slate-200">
              <nav className="flex -mb-px space-x-6">
                <button type="button" onClick={() => setTab('draw')} className={`pb-2 text-sm font-medium border-b-2 transition-colors ${tab === 'draw' ? 'border-slate-900 text-slate-900' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>Draw Signature</button>
                <button type="button" onClick={() => setTab('type')} className={`pb-2 text-sm font-medium border-b-2 transition-colors ${tab === 'type' ? 'border-slate-900 text-slate-900' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>Type Signature</button>
              </nav>
            </div>

            {tab === 'draw' ? (
              <div className="space-y-2">
                <canvas 
                  ref={canvasRef} 
                  width={400} 
                  height={160} 
                  className="border border-slate-200 rounded-lg bg-white cursor-crosshair w-full h-[160px] touch-none" 
                  onMouseDown={handleStart} 
                  onMouseMove={handleMove} 
                  onMouseUp={handleEnd} 
                  onMouseLeave={handleEnd} 
                  onTouchStart={handleStart} 
                  onTouchMove={handleMove} 
                  onTouchEnd={handleEnd} 
                />
                <div className="flex justify-end">
                  <Button type="button" variant="outline" size="sm" onClick={handleClear}>Clear Canvas</Button>
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                <Input value={typedName} onChange={e => setTypedName(e.target.value)} placeholder="Type your signature..." />
                <div className="text-4xl border border-slate-200 p-6 rounded-lg bg-slate-50 text-center font-serif text-slate-800 italic min-h-[100px] flex items-center justify-center select-none" style={{ fontFamily: "'Brush Script MT', 'Parisienne', cursive" }}>
                  {typedName || 'Signature Preview'}
                </div>
              </div>
            )}

            <div className="pt-4 flex justify-end gap-3 border-t border-slate-100">
              <Button type="button" variant="ghost" onClick={onClose}>Cancel</Button>
              <Button type="submit">Sign & Approve</Button>
            </div>
          </form>
        </Dialog>
      );
    }

          clientId: parseInt(form.clientId), 
          status: form.status,
          progress: Number(form.progress),

          revisions: Number(form.revisions),
          maxRevisions: Number(form.maxRevisions),

        <div className="space-y-6">

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                      {getHealthBadge(project.health || 'good')}

                    <p className="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-4">{client?.company || 'Unknown Client'}</p>
                    
                    <div className="space-y-2 mb-4">
                      <div className="flex justify-between text-xs">

                        <span className="font-semibold text-slate-900">{project.progress}%</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden">

                          style={{ width: `${project.progress}%` }}

                    </div>
                  </div>

                  <div className="flex items-center justify-between text-xs text-slate-500 pt-3 border-t border-slate-100">
                    <span className="flex items-center"><Calendar size={12} className="mr-1"/> {project.deadline ? formatDate(project.deadline) : 'No deadline'}</span>
                    <span className="flex items-center"><CheckSquare size={12} className="mr-1"/> Details <ChevronLeft size={12} className="rotate-180 ml-1"/></span>

    function ProjectDetailView({ projectId, projects, setProjects, clients, tasks, setTasks, onBack }) {
      const project = projects.find(p => p.id === projectId);
      const client = clients.find(c => c.id === project?.clientId);
      const projectTasks = tasks.filter(t => t.projectId === projectId);
      
      const [isTemplateModalOpen, setIsTemplateModalOpen] = useState(false);

      if (!project) return null;

      const handleHealthChange = (health) => {
        setProjects(projects.map(p => p.id === projectId ? { ...p, health } : p));
      };

      const handleRevisionAdd = () => {
        const rev = (project.revisions || 0) + 1;
        setProjects(projects.map(p => p.id === projectId ? { ...p, revisions: rev } : p));
      };

      const handleApplyTemplate = (templateId) => {
        const template = mockWorkflowTemplates.find(t => t.id === parseInt(templateId));
        if (!template) return;
        
        const newTasks = template.stages.map((stage, idx) => {
          const date = new Date(TODAY);
          date.setDate(date.getDate() + (idx * 3));
          return {
            id: Date.now() + idx,
            title: `${project.name}: ${stage}`,
            projectId: project.id,
            status: 'todo',
            assignee: mockTeam[Math.floor(Math.random() * mockTeam.length)].name,
            dueDate: date.toISOString().split('T')[0]
          };
        });
        
        setTasks([...tasks, ...newTasks]);
        setIsTemplateModalOpen(false);
      };

      const createdDate = new Date(project.createdDate || TODAY);
      const deadline = new Date(project.deadline || TODAY);
      if (!project.deadline) deadline.setDate(deadline.getDate() + 30);
      const totalDays = Math.max(1, Math.ceil((deadline - createdDate) / (1000 * 60 * 60 * 24)));
      const daysElapsed = Math.max(0, Math.ceil((new Date(TODAY) - createdDate) / (1000 * 60 * 60 * 24)));
      const slaPercentage = Math.min(100, Math.round((daysElapsed / totalDays) * 100));

      const revisions = project.revisions || 0;
      const maxRevisions = project.maxRevisions || 3;
      const revWarning = revisions >= maxRevisions;

      return (
        <div className="space-y-6 animate-in fade-in duration-300">
          <div className="flex items-center gap-4 mb-2">
            <Button variant="ghost" className="pl-0 text-slate-500" onClick={onBack}>
              <ChevronLeft size={18} className="mr-1" /> Back
            </Button>
            <div className="flex-1" />
            <Button className="bg-slate-900 text-white hover:bg-slate-800 border-transparent" size="sm" onClick={() => setIsTemplateModalOpen(true)}>
              <Zap size={14} className="mr-2" /> Apply Workflow
            </Button>
          </div>

          <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-6 justify-between items-start md:items-center">
            <div>
              <h2 className="text-2xl font-bold text-slate-900 mb-1">{project.name}</h2>
              <p className="text-slate-500 text-sm flex items-center gap-2">
                <Briefcase size={14} /> {client?.company}
              </p>
            </div>
            <div className="flex gap-4 items-center">
              <div className="text-right">
                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Health Status</p>
                <Select className="h-8 py-1 text-xs w-32 font-medium" value={project.health || 'good'} onChange={(e) => handleHealthChange(e.target.value)}>
                  <option value="good">🟢 Good</option>
                  <option value="at_risk">🟡 At Risk</option>
                  <option value="off_track">🔴 Off Track</option>
                </Select>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="md:col-span-1 space-y-6">
              <Card className="p-5">
                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Project SLA Timer</h3>
                <div className="flex justify-between items-end mb-2">
                  <span className="text-3xl font-light tracking-tighter text-slate-900">{daysElapsed}</span>
                  <span className="text-sm font-medium text-slate-500 mb-1">/ {totalDays} days</span>
                </div>
                <div className="w-full bg-slate-100 rounded-full h-2 mb-2">
                  <div className={`h-2 rounded-full ${slaPercentage > 80 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${slaPercentage}%` }} />
                </div>
                <p className="text-xs text-slate-500 text-right">{100 - slaPercentage}% time remaining</p>
              </Card>

              <Card className={`p-5 transition-colors ${revWarning ? 'border-amber-300 bg-amber-50' : ''}`}>
                <div className="flex justify-between items-start mb-4">
                  <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest">Revisions Used</h3>
                  <Button variant="outline" size="sm" className="h-6 text-[10px] px-2 bg-white" onClick={handleRevisionAdd}>Log Revision</Button>
                </div>
                <div className="flex items-center gap-3">
                  <div className="text-3xl font-bold text-slate-900">{revisions}</div>
                  <div className="text-sm text-slate-500">out of {maxRevisions}</div>
                </div>
                {revWarning && (
                  <div className="mt-3 text-xs font-semibold text-amber-700 flex items-center gap-1.5 bg-amber-100/50 p-2 rounded">
                    <AlertCircle size={12} /> Max revisions reached!
                  </div>
                )}
              </Card>
            </div>

            <div className="md:col-span-2">
              <Card className="p-6 h-full">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="font-bold text-slate-900">Project Timeline</h3>
                  <Badge>{projectTasks.length} Tasks</Badge>
                </div>
                
                {projectTasks.length === 0 ? (
                  <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                    <p className="text-slate-500 mb-4 text-sm font-medium">No tasks assigned to this project yet.</p>
                    <Button onClick={() => setIsTemplateModalOpen(true)}><Zap size={16} className="mr-2" /> Apply Workflow Template</Button>
                  </div>
                ) : (
                  <div className="space-y-4 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-slate-200 before:via-slate-200 before:to-transparent">
                    {projectTasks.sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate)).map((task, idx) => (
                      <div key={task.id} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                        <div className={`flex items-center justify-center w-10 h-10 rounded-full border-[3px] border-white shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 shadow-sm z-10 ${task.status === 'done' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}>
                          {task.status === 'done' ? <Check size={16} strokeWidth={3} /> : <span className="text-xs font-bold">{idx + 1}</span>}
                        </div>
                        <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl border border-slate-200 bg-white shadow-sm hover:border-slate-300 transition-colors">
                          <div className="flex items-center justify-between mb-1">
                            <h4 className={`font-semibold text-sm ${task.status === 'done' ? 'text-slate-400 line-through' : 'text-slate-800'}`}>{task.title}</h4>
                            <Badge variant={task.status === 'done' ? 'success' : 'default'} className="text-[9px] px-1.5 py-0 capitalize">
                              {task.status}
                            </Badge>
                          </div>
                          <div className="flex items-center gap-3 text-xs text-slate-500 mt-3">
                            <span className="flex items-center gap-1 font-medium bg-slate-100 px-2 py-1 rounded-md"><Calendar size={12} className="text-slate-400"/> {formatDate(task.dueDate)}</span>
                            <span className="flex items-center gap-1.5 font-medium"><Avatar name={task.assignee} className="w-5 h-5 text-[8px]" /> {task.assignee}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            </div>
          </div>

          <Dialog isOpen={isTemplateModalOpen} onClose={() => setIsTemplateModalOpen(false)} title="Apply Workflow Template" maxWidth="max-w-2xl">
            <div className="space-y-4 pb-2">
              <p className="text-sm text-slate-500 mb-4">Select a standardized agency workflow. This will automatically spawn tasks and set timelines.</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {mockWorkflowTemplates.map(template => (
                  <div key={template.id} onClick={() => handleApplyTemplate(template.id)} className="p-4 border border-slate-200 hover:border-slate-900 bg-white hover:bg-slate-50 rounded-xl cursor-pointer transition-all group shadow-sm hover:shadow">
                    <div className="flex justify-between items-start mb-2">
                      <h4 className="font-bold text-sm text-slate-900">{template.name}</h4>
                      <Badge variant="default" className="text-[10px]">{template.stages.length} stages</Badge>
                    </div>
                    <div className="flex gap-1 flex-wrap mt-2">
                      {template.stages.slice(0, 3).map((s, i) => (
                        <span key={i} className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">{s}</span>
                      ))}
                      {template.stages.length > 3 && <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">+{template.stages.length - 3}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </Dialog>
        </div>
      );
    }

    function TasksView({ tasks, setTasks }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [form, setForm] = useState({ title: '', assignee: 'Admin', dueDate: '' });
      const columns = ['todo', 'doing', 'done'];

      const handleDragStart = (e, id) => e.dataTransfer.setData('taskId', id);
      const handleDrop = (e, status) => {
        e.preventDefault();
        const id = parseInt(e.dataTransfer.getData('taskId'));
        setTasks(tasks.map(t => t.id === id ? { ...t, status } : t));
      };

      const handleAdd = (e) => {
        e.preventDefault();
        setTasks([...tasks, { ...form, id: Date.now(), status: 'todo' }]);
        setIsModalOpen(false);
        setForm({ title: '', assignee: 'Admin', dueDate: '' });
      };

      const isOverdue = (dateStr) => new Date(dateStr) < new Date(TODAY);

      return (
        <div className="h-full flex flex-col">
          <div className="flex justify-between items-center mb-6">
            <p className="text-slate-500 text-sm hidden md:block">Track project execution and internal tasks.</p>
            <Button onClick={() => setIsModalOpen(true)} className="ml-auto"><Plus size={16} className="mr-2" /> Add Task</Button>
          </div>

          <div className="flex-1 grid grid-cols-1 md:grid-cols-3 gap-6 pb-4">
            {columns.map(status => (
              <div 
                key={status} 
                className="bg-slate-100/50 rounded-xl p-4 flex flex-col min-h-[300px]"
                onDragOver={(e) => e.preventDefault()}
                onDrop={(e) => handleDrop(e, status)}
              >
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold text-slate-700 capitalize">{status}</h3>
                  <Badge variant="default">{tasks.filter(t => t.status === status).length}</Badge>
                </div>
                <div className="flex-1 space-y-3 overflow-y-auto custom-scrollbar">
                  {tasks.filter(t => t.status === status).map(task => (
                    <Card 
                      key={task.id} 
                      className="p-4 cursor-grab active:cursor-grabbing hover:border-slate-300 transition-colors"
                      draggable
                      onDragStart={(e) => handleDragStart(e, task.id)}
                    >
                      <p className={`font-medium text-sm mb-4 ${status === 'done' ? 'text-slate-400 line-through' : 'text-slate-900'}`}>
                        {task.title}
                      </p>
                      <div className="flex justify-between items-center">
                        <div className={`flex items-center text-[10px] font-semibold uppercase ${isOverdue(task.dueDate) && status !== 'done' ? 'text-red-600 bg-red-50 border border-red-200 px-2 py-0.5 rounded-full' : 'text-slate-400'}`}>
                          <Calendar size={12} className="mr-1.5" />

    function ReportsView({ invoices = [], leads = [], projects = [], quotes = [] }) {
      const [isMounted, setIsMounted] = React.useState(false);
      const [hoveredRevenueIndex, setHoveredRevenueIndex] = React.useState(null);
      const [hoveredFunnelIndex, setHoveredFunnelIndex] = React.useState(null);

      React.useEffect(() => {
        const timer = setTimeout(() => setIsMounted(true), 100);
        return () => clearTimeout(timer);
      }, []);

      // 1. Revenue Progression Data
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
      const billedData = [120000, 150000, 180000, 240000, 220000, 310000];
      const collectedData = [90000, 130000, 160000, 200000, 210000, 280000];

      // 2. Sales Funnel Calculation (Using all leads to show conversion pipeline accurately)
      const leadCount = leads.length;
      const qualifiedCount = leads.filter(l => ['qualified', 'proposal', 'won'].includes(l.stage)).length;
      const proposalCount = leads.filter(l => ['proposal', 'won'].includes(l.stage)).length;
      const wonCount = leads.filter(l => l.stage === 'won').length;

      const funnelStages = [
        { name: 'Lead', count: leadCount, key: 'lead' },
        { name: 'Qualified', count: qualifiedCount, key: 'qualified' },
        { name: 'Proposal', count: proposalCount, key: 'proposal' },
        { name: 'Won', count: wonCount, key: 'won' }
      ];

      // 3. Radial KPI Calculations
      const activeProjects = projects.filter(p => p.status !== 'done');
      const avgProgress = projects.length > 0 ? (projects.reduce((sum, p) => sum + p.progress, 0) / projects.length) : 0;

      return (
        <div className="space-y-6">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            {/* Widget 1: Revenue Progression */}
            <Card className="p-6 flex flex-col justify-between lg:col-span-2">
              <div>
                <h3 className="font-semibold text-slate-900 text-base mb-1">Revenue Progression</h3>
                <p className="text-xs text-slate-500 mb-4">Billed vs. Collected Revenue (Jan - Jun 2026)</p>
              </div>
              <div className="relative">
                <svg viewBox="0 0 650 300" className="w-full h-auto">
                  {/* Grid Lines */}
                  {[0, 1, 2, 3, 4].map((grid, idx) => {
                    const y = 40 + idx * 52.5;
                    return (
                      <line key={idx} x1={65} y1={y} x2={625} y2={y} stroke="#E2E8F0" strokeWidth={1} strokeDasharray="4 4" />
                    );
                  })}

                  {/* X-axis Labels */}
                  {months.map((m, idx) => {
                    const x = 65 + idx * 112;
                    return (
                      <text key={idx} x={x} y={290} textAnchor="middle" fontSize={10} fill="#94A3B8" fontWeight="bold">{m}</text>
                    );
                  })}

                  {/* Y-axis Labels */}
                  {[0, 75000, 150000, 225000, 300000].reverse().map((val, idx) => {
                    const y = 40 + idx * 52.5;
                    return (
                      <text key={idx} x={50} y={y + 4} textAnchor="end" fontSize={9} fill="#94A3B8" fontWeight="bold">₹{val >= 100000 ? `${(val / 100000).toFixed(1)}L` : `${val / 1000}`}</text>
                    );
                  })}

                  {/* Gradients */}
                  <defs>
                    <linearGradient id="billedGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#111" stopOpacity="0.15" />
                      <stop offset="100%" stopColor="#111" stopOpacity="0.0" />
                    </linearGradient>
                    <linearGradient id="collectedGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#64748B" stopOpacity="0.15" />
                      <stop offset="100%" stopColor="#64748B" stopOpacity="0.0" />
                    </linearGradient>
                  </defs>

                  {/* Under Fills */}
                  {isMounted && (
                    <>
                      <path 
                        d={`M 65,250 
                            L 65,${250 - (billedData[0] / 300000) * 210} 
                            L 177,${250 - (billedData[1] / 300000) * 210} 
                            L 289,${250 - (billedData[2] / 300000) * 210} 
                            L 401,${250 - (billedData[3] / 300000) * 210} 
                            L 513,${250 - (billedData[4] / 300000) * 210} 
                            L 625,${250 - (billedData[5] / 300000) * 210} 
                            L 625,250 Z`} 
                        fill="url(#billedGrad)" 
                        style={{ transition: 'opacity 1s ease-in-out', opacity: isMounted ? 1 : 0 }}
                      />
                      <path 
                        d={`M 65,250 
                            L 65,${250 - (collectedData[0] / 300000) * 210} 
                            L 177,${250 - (collectedData[1] / 300000) * 210} 
                            L 289,${250 - (collectedData[2] / 300000) * 210} 
                            L 401,${250 - (collectedData[3] / 300000) * 210} 
                            L 513,${250 - (collectedData[4] / 300000) * 210} 
                            L 625,${250 - (collectedData[5] / 300000) * 210} 
                            L 625,250 Z`} 
                        fill="url(#collectedGrad)" 
                        style={{ transition: 'opacity 1s ease-in-out', opacity: isMounted ? 1 : 0 }}
                      />
                    </>
                  )}

                  {/* Lines */}
                  <path 
                    d={`M 65,${250 - (billedData[0] / 300000) * 210} 
                        L 177,${250 - (billedData[1] / 300000) * 210} 
                        L 289,${250 - (billedData[2] / 300000) * 210} 
                        L 401,${250 - (billedData[3] / 300000) * 210} 
                        L 513,${250 - (billedData[4] / 300000) * 210} 
                        L 625,${250 - (billedData[5] / 300000) * 210}`} 
                    fill="none" 
                    stroke="#111" 
                    strokeWidth={3} 
                    strokeLinecap="round"
                    style={{ transition: 'stroke-dashoffset 1.5s ease-in-out', strokeDasharray: 1000, strokeDashoffset: isMounted ? 0 : 1000 }}
                  />
                  <path 
                    d={`M 65,${250 - (collectedData[0] / 300000) * 210} 
                        L 177,${250 - (collectedData[1] / 300000) * 210} 
                        L 289,${250 - (collectedData[2] / 300000) * 210} 
                        L 401,${250 - (collectedData[3] / 300000) * 210} 
                        L 513,${250 - (collectedData[4] / 300000) * 210} 
                        L 625,${250 - (collectedData[5] / 300000) * 210}`} 
                    fill="none" 
                    stroke="#64748B" 
                    strokeWidth={2.5} 
                    strokeLinecap="round"
                    style={{ transition: 'stroke-dashoffset 1.5s ease-in-out', strokeDasharray: 1000, strokeDashoffset: isMounted ? 0 : 1000 }}
                  />

                  {/* Data Points / Interaction Rings */}
                  {months.map((_, idx) => {
                    const x = 65 + idx * 112;
                    const yBilled = 250 - (billedData[idx] / 300000) * 210;
                    const yCollected = 250 - (collectedData[idx] / 300000) * 210;
                    const isHovered = hoveredRevenueIndex === idx;

                    return (
                      <g key={idx}>
                        <circle cx={x} cy={yBilled} r={isHovered ? 6 : 4} fill="#111" stroke="#FFF" strokeWidth={1.5} className="transition-all duration-200" />
                        <circle cx={x} cy={yCollected} r={isHovered ? 6 : 4} fill="#64748B" stroke="#FFF" strokeWidth={1.5} className="transition-all duration-200" />
                        {/* Hover Overlay Columns */}
                        <rect 
                          x={x - 56} 
                          y={20} 
                          width={112} 
                          height={250} 
                          fill="transparent" 
                          onMouseEnter={() => setHoveredRevenueIndex(idx)} 
                          onMouseLeave={() => setHoveredRevenueIndex(null)}
                          className="cursor-pointer"
                        />
                      </g>
                    );
                  })}

                  {/* Interactive Tooltip */}
                  {hoveredRevenueIndex !== null && (
                    <g transform={`translate(${65 + hoveredRevenueIndex * 112 + (hoveredRevenueIndex > 3 ? -145 : 15)}, 50)`} className="pointer-events-none transition-transform duration-200">
                      <rect width={135} height={75} rx={8} fill="#111" opacity={0.95} />
                      <text x={12} y={20} fill="#FFF" fontSize={11} fontWeight="bold">{months[hoveredRevenueIndex]}</text>
                      <text x={12} y={40} fill="#CBD5E1" fontSize={10}>Billed: <tspan fill="#FFF" fontWeight="bold">{formatINR(billedData[hoveredRevenueIndex])}</tspan></text>
                      <text x={12} y={58} fill="#CBD5E1" fontSize={10}>Collected: <tspan fill="#FFF" fontWeight="bold">{formatINR(collectedData[hoveredRevenueIndex])}</tspan></text>
                    </g>
                  )}
                </svg>
              </div>
              <div className="flex gap-4 justify-center text-xs mt-3 select-none">
                <span className="flex items-center gap-1.5 font-medium"><span className="w-3 h-3 bg-slate-900 rounded-full"></span> Billed Revenue</span>
                <span className="flex items-center gap-1.5 font-medium text-slate-500"><span className="w-3 h-3 bg-slate-500 rounded-full"></span> Collected Revenue</span>
              </div>
            </Card>

            {/* Widget 2: Sales Funnel */}
            <Card className="p-6 flex flex-col justify-between">
              <div>
                <h3 className="font-semibold text-slate-900 text-base mb-1">Sales Funnel</h3>
                <p className="text-xs text-slate-500 mb-4">Pipeline conversion & customer progression</p>
              </div>
              <div className="relative flex justify-center items-center">
                <svg viewBox="0 0 500 240" className="w-full h-auto">
                  {funnelStages.map((stage, idx) => {
                    const isHovered = hoveredFunnelIndex === idx;
                    const prevCount = idx > 0 ? funnelStages[idx-1].count : stage.count;
                    const conversionRate = prevCount > 0 ? Math.round((stage.count / prevCount) * 100) : 0;
                    const conversionText = idx > 0 ? ` (${conversionRate}% conv)` : '';

                    // Funnel Segment Coordinates
                    // Top Y, Bottom Y
                    const y1 = 10 + idx * 52;
                    const y2 = y1 + 46;

                    // Trapezoid top/bottom widths (proportional to counts)
                    const getWidthForCount = (c) => leadCount > 0 ? Math.max((c / leadCount) * 320, 60) : 60;
                    const topW = idx === 0 ? getWidthForCount(leadCount) : getWidthForCount(funnelStages[idx].count);
                    const botW = idx === 3 ? getWidthForCount(wonCount) * 0.7 : getWidthForCount(funnelStages[idx+1].count);

                    const xT1 = 250 - topW / 2;
                    const xT2 = 250 + topW / 2;
                    const xB1 = 250 - botW / 2;
                    const xB2 = 250 + botW / 2;

                    const points = `${xT1},${y1} ${xT2},${y1} ${xB2},${y2} ${xB1},${y2}`;
                    
                    const opacities = [0.95, 0.8, 0.65, 0.5];
                    const opacityVal = isHovered ? 1.0 : opacities[idx];

                    return (
                      <g key={stage.key}>
                        <polygon 
                          points={points} 
                          fill="#111"
                          opacity={isMounted ? opacityVal : 0}
                          className="transition-all duration-300 cursor-pointer"
                          onMouseEnter={() => setHoveredFunnelIndex(idx)}
                          onMouseLeave={() => setHoveredFunnelIndex(null)}
                          style={{ transition: 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease-out', transform: isMounted ? 'translateY(0)' : 'translateY(15px)' }}
                        />
                        <text x={250} y={y1 + 27} textAnchor="middle" fill="#FFF" fontSize={11} fontWeight="bold" className="pointer-events-none select-none uppercase tracking-wider">{stage.name}: {stage.count}{conversionText}</text>
                      </g>
                    );
                  })}

                  {/* Funnel Dropoff / Conversion Tooltip */}
                  {hoveredFunnelIndex !== null && (
                    <g transform={`translate(360, ${Math.max(10, 10 + hoveredFunnelIndex * 52 - 10)})`} className="pointer-events-none transition-transform duration-200">
                      <rect width={130} height={60} rx={8} fill="#111" opacity={0.95} />
                      <text x={12} y={18} fill="#FFF" fontSize={10} fontWeight="bold">{funnelStages[hoveredFunnelIndex].name} Stage</text>
                      <text x={12} y={34} fill="#CBD5E1" fontSize={9}>Count: <tspan fill="#FFF" fontWeight="bold">{funnelStages[hoveredFunnelIndex].count}</tspan></text>
                      <text x={12} y={48} fill="#FCA5A5" fontSize={9}>
                        {hoveredFunnelIndex > 0 
                          ? `Drop-off: ${Math.round(100 - (funnelStages[hoveredFunnelIndex].count / funnelStages[hoveredFunnelIndex-1].count) * 100)}%`
                          : 'Drop-off: 0%'
                        }
                      </text>
                    </g>
                  )}
                </svg>
              </div>
            </Card>

            {/* Widget 3: Active Projects Progress */}
            <Card className="p-6 flex flex-col justify-between">
              <div>
                <h3 className="font-semibold text-slate-900 text-base mb-1">Active Projects Delivery</h3>
                <p className="text-xs text-slate-500 mb-4">Radial performance indicators of ongoing work</p>
              </div>
              <div className="flex justify-center items-center py-4">
                <svg viewBox="0 0 540 200" className="w-full h-auto">
                  {/* Big Circle: Avg Completion */}
                  <g>
                    <circle cx={100} cy={90} r={55} fill="none" stroke="#E2E8F0" strokeWidth={10} />
                    <circle 
                      cx={100} 
                      cy={90} 
                      r={55} 
                      fill="none" 
                      stroke="#111" 
                      strokeWidth={10} 
                      strokeDasharray={345.5} 
                      strokeDashoffset={isMounted ? 345.5 * (1 - avgProgress / 100) : 345.5} 
                      strokeLinecap="round" 
                      transform="rotate(-90 100 90)" 
                      style={{ transition: 'stroke-dashoffset 1.5s ease-in-out' }} 
                    />
                    <text x={100} y={97} textAnchor="middle" fontSize={18} fontWeight="bold" fill="#111">{Math.round(avgProgress)}%</text>
                    <text x={100} y={170} textAnchor="middle" fontSize={10} fontWeight="bold" fill="#64748B" className="uppercase tracking-wider">Avg Completion</text>
                  </g>

                  {/* Active Project Rings */}
                  {activeProjects.slice(0, 3).map((p, idx) => {
                    const cx = 250 + idx * 115;
                    const cy = 90;
                    const r = 32;
                    const circ = 201;

                    return (
                      <g key={p.id}>
                        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E2E8F0" strokeWidth={6} />
                        <circle 
                          cx={cx} 
                          cy={cy} 
                          r={r} 
                          fill="none" 
                          stroke="#475569" 
                          strokeWidth={6} 
                          strokeDasharray={circ} 
                          strokeDashoffset={isMounted ? circ * (1 - p.progress / 100) : circ} 
                          strokeLinecap="round" 
                          transform={`rotate(-90 ${cx} ${cy})`}
                          style={{ transition: 'stroke-dashoffset 1.5s ease-in-out' }} 
                        />
                        <text x={cx} y={94} textAnchor="middle" fontSize={11} fontWeight="bold" fill="#334155">{p.progress}%</text>
                        <text x={cx} y={150} textAnchor="middle" fontSize={9} fontWeight="bold" fill="#111" className="truncate">{p.name.slice(0, 12)}</text>
                      </g>
                    );
                  })}

                  {activeProjects.length === 0 && (
                    <text x={365} y={100} textAnchor="middle" fontSize={12} fill="#94A3B8" fontStyle="italic">No active projects at the moment</text>
                  )}
                </svg>
              </div>
            </Card>

          </div>
        </div>
      );
    }

    function CampaignDetailView({ campaignId, campaigns, setCampaigns, clients, onBack }) {
      const campaign = campaigns.find(c => c.id === campaignId);
      if (!campaign) return null;
      const client = clients.find(c => c.id === campaign.clientId);
      const [activeTab, setActiveTab] = useState('overview');

      const renderAdSets = () => {
        if (!campaign.adSets || campaign.adSets.length === 0) {
          return <div className="text-center py-10 text-slate-500 text-sm">No ad sets found for this campaign.</div>;
        }

        return campaign.adSets.map(adSet => {
          const totalConversions = adSet.ads.reduce((sum, ad) => sum + ad.conversions, 0);
          const totalSpend = adSet.ads.reduce((sum, ad) => sum + ad.spend, 0);
          const cpa = totalConversions > 0 ? (totalSpend / totalConversions).toFixed(2) : 0;
          return (
            <div key={adSet.id} className="mb-6 border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm">
              <div className="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                <div>
                  <h4 className="font-bold text-slate-800">{adSet.name}</h4>
                  <p className="text-xs text-slate-500">Budget: {formatINR(adSet.budget)}</p>
                </div>
                <div className="flex gap-4 text-sm">
                  <div className="text-center"><div className="font-bold text-slate-800">{totalConversions}</div><div className="text-xs text-slate-500">Conversions</div></div>
                  <div className="text-center"><div className="font-bold text-slate-800">₹{cpa}</div><div className="text-xs text-slate-500">Avg CPA</div></div>

              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-xs text-left">
                  <thead className="text-slate-500 bg-white border-b border-slate-100 uppercase">
                    <tr>
                      <th className="px-4 py-3 font-medium">Ad Name</th>
                      <th className="px-4 py-3 font-medium">Spend</th>
                      <th className="px-4 py-3 font-medium">Impressions</th>
                      <th className="px-4 py-3 font-medium">Clicks</th>

                  <tbody className="divide-y divide-slate-100">
                    {adSet.ads.map(ad => {
                      const ctr = ad.impressions > 0 ? ((ad.clicks / ad.impressions) * 100).toFixed(2) : 0;

                        <tr key={ad.id} className="hover:bg-slate-50">
                          <td className="px-4 py-3 font-medium text-slate-800">{ad.name}</td>
                          <td className="px-4 py-3 text-slate-600">{formatINR(ad.spend)}</td>
