                          <td className="px-4 py-3 text-slate-600">{ad.clicks.toLocaleString()}</td>
                          <td className="px-4 py-3 font-bold text-emerald-600">{ad.conversions}</td>
                          <td className="px-4 py-3 text-slate-600">{ctr}%</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        });
      };

      return (
        <div className="space-y-6">
          <div className="flex items-center gap-3">
            <Button variant="outline" size="sm" onClick={onBack} className="h-8 px-2"><ArrowLeft size={16} /></Button>
            <h2 className="text-xl font-bold text-slate-900">Campaign Details</h2>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div className="md:col-span-1 space-y-6">
              <Card className="p-5">
                <Badge variant={campaign.status === 'active' ? 'success' : 'default'} className="mb-3 capitalize">{campaign.status}</Badge>
                <h3 className="text-lg font-bold text-slate-900 leading-tight mb-1">{campaign.name}</h3>
                <p className="text-sm text-slate-500 mb-4">{client ? client.company : 'Unknown Client'}</p>
                <div className="space-y-3">
                  <div>
                    <p className="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Platform</p>
                    <p className="text-sm font-medium text-slate-800 flex items-center gap-2"><Megaphone size={14} className="text-blue-500"/> {campaign.platform}</p>
                  </div>
                  <div>
                    <p className="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Duration</p>
                    <p className="text-sm font-medium text-slate-800">{formatDate(campaign.startDate)} - {formatDate(campaign.endDate)}</p>
                  </div>
                  <div className="pt-3 border-t border-slate-100">
                    <p className="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-2">Budget Utilization</p>
                    <div className="flex justify-between items-end mb-1">
                      <span className="text-lg font-bold text-slate-900">{formatINR(campaign.spent)}</span>
                      <span className="text-xs font-medium text-slate-500 mb-1">/ {formatINR(campaign.budget)}</span>
                    </div>
                    <div className="w-full bg-slate-100 rounded-full h-2">
                      <div className={`h-2 rounded-full ${(campaign.spent/campaign.budget) > 0.9 ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${Math.min((campaign.spent/campaign.budget)*100, 100)}%` }} />
                    </div>
                  </div>
                </div>
              </Card>
            </div>

            <div className="md:col-span-3">
              <Card className="p-6 h-full">
                <div className="flex border-b border-slate-200 mb-6">
                  {['overview', 'ad-sets', 'ab-tests', 'keywords'].map(tab => (
                    <button
                      key={tab}
                      className={`pb-3 px-4 text-sm font-medium border-b-2 transition-colors ${activeTab === tab ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
                      onClick={() => setActiveTab(tab)}
                    >
                      {tab.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}
                    </button>
                  ))}
                </div>

                {activeTab === 'overview' && (
                  <div className="space-y-6">
                    <div className="grid grid-cols-3 gap-4">
                      <div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <p className="text-xs text-slate-500 font-medium mb-1">Total Conversions</p>
                        <p className="text-2xl font-bold text-slate-900">{campaign.adSets ? campaign.adSets.reduce((sum, as) => sum + as.ads.reduce((s, a) => s + a.conversions, 0), 0) : 0}</p>
                      </div>
                      <div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <p className="text-xs text-slate-500 font-medium mb-1">Total Clicks</p>
                        <p className="text-2xl font-bold text-slate-900">{campaign.adSets ? campaign.adSets.reduce((sum, as) => sum + as.ads.reduce((s, a) => s + a.clicks, 0), 0).toLocaleString() : 0}</p>
                      </div>
                      <div className="p-4 bg-slate-50 rounded-xl border border-slate-100">
                        <p className="text-xs text-slate-500 font-medium mb-1">Overall CTR</p>
                        <p className="text-2xl font-bold text-slate-900">
                          {(() => {
                            if (!campaign.adSets) return "0%";
                            const imp = campaign.adSets.reduce((sum, as) => sum + as.ads.reduce((s, a) => s + a.impressions, 0), 0);
                            const clk = campaign.adSets.reduce((sum, as) => sum + as.ads.reduce((s, a) => s + a.clicks, 0), 0);
                            return imp > 0 ? ((clk/imp)*100).toFixed(2) + "%" : "0%";
                          })()}
                        </p>
                      </div>
                    </div>
                    <div className="h-64 flex items-center justify-center border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                      <p className="text-sm font-medium text-slate-400 flex items-center gap-2"><BarChart3 size={16} /> Performance Chart Placeholder</p>
                    </div>
                  </div>
                )}

                {activeTab === 'ad-sets' && renderAdSets()}

                {activeTab === 'ab-tests' && (
                  <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                    <p className="text-sm font-medium text-slate-500 mb-2">AB Tests & Hooks Integration</p>
                    <p className="text-xs text-slate-400">Select an AB test to link with this campaign.</p>
                  </div>
                )}

                {activeTab === 'keywords' && (
                  <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                    <p className="text-sm font-medium text-slate-500 mb-2">Keyword Tracking</p>
                    <p className="text-xs text-slate-400">View targeted keywords and search trends.</p>
                  </div>
                )}
              </Card>
            </div>
          </div>
        </div>
      );
    }

    function ContentView({ contentItems, setContentItems }) {
      const [filter, setFilter] = useState('all');

      const filteredContent = contentItems.filter(item => {
        if (filter === 'all') return true;
        return item.status === filter;
      });

      return (
        <div className="space-y-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <h2 className="text-2xl font-bold text-slate-900 tracking-tight">Content Hub</h2>
              <p className="text-slate-500 text-sm mt-1">Manage content pipeline, approvals, and distribution.</p>
            </div>
            <Button><Plus size={16} className="mr-2" /> New Content</Button>
          </div>

          <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
            {['all', 'draft', 'in-review', 'approved', 'scheduled', 'published'].map(f => (
              <Button 
                key={f} 
                variant={filter === f ? 'primary' : 'outline'} 
                size="sm" 
                onClick={() => setFilter(f)}
                className="capitalize whitespace-nowrap"
              >
                {f.replace('-', ' ')}
              </Button>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 space-y-4">
              {filteredContent.map(item => (
                <Card key={item.id} className="p-4 hover:shadow-md transition-shadow group flex items-start gap-4 cursor-pointer">
                  <div className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 ${
                    item.status === 'published' ? 'bg-emerald-100 text-emerald-600' :
                    item.status === 'in-review' ? 'bg-amber-100 text-amber-600' :
                    item.status === 'scheduled' ? 'bg-blue-100 text-blue-600' :
                    item.status === 'approved' ? 'bg-green-100 text-green-600' :
                    'bg-slate-100 text-slate-600'
                  }`}>
                    {item.type === 'video-script' ? <Image size={20} /> : <FileText size={20} />}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex justify-between items-start mb-1">
                      <h3 className="font-semibold text-slate-900 truncate pr-4">{item.title}</h3>
                      <Badge variant={
                        item.status === 'published' ? 'success' :
                        item.status === 'in-review' ? 'warning' :
                        item.status === 'scheduled' ? 'default' : 'outline'
                      } className="capitalize shrink-0">{item.status.replace('-', ' ')}</Badge>
                    </div>
                    <div className="flex items-center gap-3 text-xs text-slate-500 mt-2">
                      <span className="flex items-center gap-1"><Avatar name={item.author} className="w-4 h-4 text-[8px]" /> {item.author}</span>
                      <span className="flex items-center gap-1"><Calendar size={12} /> {formatDate(item.date)}</span>
                      <span className="capitalize px-1.5 py-0.5 bg-slate-100 rounded text-slate-600 font-medium">{item.type}</span>
                    </div>
                  </div>
                </Card>
              ))}
              {filteredContent.length === 0 && (
                <div className="text-center py-12 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                  <p className="text-sm font-medium text-slate-500">No content items found for this filter.</p>
                </div>
              )}
            </div>

            <div className="lg:col-span-1 space-y-6">
              <Card className="p-5">
                <h3 className="font-bold text-slate-900 mb-4 flex items-center gap-2"><CheckCircle2 size={16} className="text-blue-500" /> Approval Queue</h3>
                <div className="space-y-3">
                  {contentItems.filter(i => i.status === 'in-review').map(item => (
                    <div key={item.id} className="p-3 bg-slate-50 border border-slate-100 rounded-lg flex justify-between items-center">
                      <div className="min-w-0 flex-1 pr-3">
                        <p className="text-sm font-medium text-slate-800 truncate">{item.title}</p>
                        <p className="text-xs text-slate-500 mt-0.5">by {item.author}</p>
                      </div>
                      <Button size="sm" className="h-7 px-2 shrink-0">Review</Button>
                    </div>
                  ))}
                  {contentItems.filter(i => i.status === 'in-review').length === 0 && (
                    <p className="text-xs text-slate-500 text-center py-2">All caught up!</p>
                  )}
                </div>
              </Card>

              <Card className="p-5">
                <h3 className="font-bold text-slate-900 mb-4 flex items-center gap-2"><Lightbulb size={16} className="text-amber-500" /> Hook Library</h3>
                <div className="space-y-3">
                  {/* Assuming mockHooks is available globally in scope, since we're inside App */}
                  <div className="text-xs text-slate-500 bg-amber-50 p-3 rounded border border-amber-100 text-amber-800 font-medium">
                    "Stop wasting ad spend — here is what top brands do differently"
                  </div>
                  <div className="text-xs text-slate-500 bg-slate-50 p-3 rounded border border-slate-100">
                    "We grew this D2C brand 300% in 6 months. Here is the exact playbook."
                  </div>
                  <div className="text-xs text-slate-500 bg-slate-50 p-3 rounded border border-slate-100">
                    "5 AI tools that cut our content creation time by 70%"
                  </div>
                  <Button variant="outline" className="w-full text-xs h-8">View All Hooks</Button>
                </div>
              </Card>
            </div>
          </div>
        </div>
      );
    }

function FunnelView({ leads }) {
      const [startDate, setStartDate] = useState('');
      const [endDate, setEndDate] = useState('');
      const [isMounted, setIsMounted] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setIsMounted(true), 100);
        return () => clearTimeout(timer);
      }, []);

      const filteredLeads = leads.filter(l => {
        if (!l.createdDate) return true;
        if (startDate && l.createdDate < startDate) return false;
        if (endDate && l.createdDate > endDate) return false;
        return true;
      });

      const totalCount = filteredLeads.length || 1;
      const qualifiedCount = filteredLeads.filter(l => ['qualified', 'proposal', 'won'].includes(l.stage)).length;
      const proposalCount = filteredLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length;
      const wonCount = filteredLeads.filter(l => l.stage === 'won').length;

      const stages = [
        { name: 'Lead', count: filteredLeads.length },
        { name: 'Qualified', count: qualifiedCount },
        { name: 'Proposal', count: proposalCount },
        { name: 'Won', count: wonCount }
      ];

      // Drop-off heatmap data
      const sources = ['web', 'referral', 'instagram', 'whatsapp', 'linkedin'];
      
      const sourceData = sources.map(source => {
        const sourceLeads = filteredLeads.filter(l => l.source === source);
        const sourceTotal = sourceLeads.length;
        const sourceQualified = sourceLeads.filter(l => ['qualified', 'proposal', 'won'].includes(l.stage)).length;
        const sourceWon = sourceLeads.filter(l => l.stage === 'won').length;
        const conversionRate = sourceTotal > 0 ? Math.round((sourceWon / sourceTotal) * 100) : 0;
        
        // Calculate drop-off percentages for heatmap
        const dropLead = sourceTotal > 0 ? ((sourceTotal - sourceQualified) / sourceTotal) * 100 : 0;
        const dropQual = sourceQualified > 0 ? ((sourceQualified - sourceLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length) / sourceQualified) * 100 : 0;
        const dropProp = sourceLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length > 0 ? ((sourceLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length - sourceWon) / sourceLeads.filter(l => ['proposal', 'won'].includes(l.stage)).length) * 100 : 0;

        return { 
          source, 
          total: sourceTotal, 
          qualified: sourceQualified, 
          won: sourceWon, 
          rate: conversionRate,
          dropoffs: [dropLead, dropQual, dropProp]
        };
      }).filter(s => s.total > 0);

      const getHeatmapColor = (percentage) => {
        if (percentage === 0) return '#F1F5F9'; // slate-100
        if (percentage < 20) return '#BBF7D0'; // green-200
        if (percentage < 50) return '#FEF08A'; // yellow-200
        if (percentage < 75) return '#FED7AA'; // orange-200
        return '#FECACA'; // red-200
      };

      return (
        <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
          <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Conversion Funnel</h1>
              <p className="text-slate-500">Analyze lead progression and source performance</p>
            </div>
            <div className="flex items-center gap-2">
              <Input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-auto text-sm" />
              <span className="text-slate-400">to</span>
              <Input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-auto text-sm" />
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <Card className="p-6">
              <h3 className="font-bold text-slate-900 mb-6">Pipeline Velocity</h3>
              <div className="flex flex-col items-center">
                <svg width="100%" height="320" viewBox="0 0 400 320" className="overflow-visible">
                  {stages.map((stage, i) => {
                    const prevCount = i === 0 ? totalCount : stages[i-1].count;
                    const prevWidth = Math.max(40, (prevCount / totalCount) * 300);
                    const currWidth = Math.max(40, (stage.count / totalCount) * 300);
                    
                    const startY = i * 80;
                    const points = `
                      ${200 - prevWidth/2},${startY} 
                      ${200 + prevWidth/2},${startY} 
                      ${200 + currWidth/2},${startY + 60} 
                      ${200 - currWidth/2},${startY + 60}
                    `;
                    
                    const conversionFromPrev = prevCount > 0 ? Math.round((stage.count / prevCount) * 100) : 0;
                    
                    return (
                      <g key={stage.name} className="transition-all duration-1000 ease-out" style={{ opacity: isMounted ? 1 : 0, transform: `translateY(${isMounted ? 0 : 20}px)` }}>
                        <polygon 
                          points={points} 
                          fill={i === 0 ? '#F1F5F9' : i === 1 ? '#E2E8F0' : i === 2 ? '#CBD5E1' : '#94A3B8'} 
                          stroke="#FFF" 
                          strokeWidth="2"
                        />
                        <text x="200" y={startY + 35} textAnchor="middle" fill="#0F172A" fontSize="14" fontWeight="bold">
                          {stage.name} ({stage.count})
                        </text>
                        {i > 0 && (
                          <g transform={`translate(280, ${startY - 10})`}>
                            <rect width="40" height="20" rx="10" fill="#FFF" stroke="#E2E8F0" />
                            <text x="20" y="14" textAnchor="middle" fill="#64748B" fontSize="10" fontWeight="bold">{conversionFromPrev}%</text>
                          </g>
                        )}
                      </g>
                    );
                  })}
                </svg>
              </div>
            </Card>

            <Card className="p-6">
              <h3 className="font-bold text-slate-900 mb-6">Stage Drop-off Heatmap</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
                    <tr>
                      <th className="px-4 py-3 font-semibold rounded-tl-lg">Source</th>
                      <th className="px-4 py-3 font-semibold">Drop @ Lead</th>
                      <th className="px-4 py-3 font-semibold">Drop @ Qual</th>
                      <th className="px-4 py-3 font-semibold rounded-tr-lg">Drop @ Prop</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sourceData.map(source => (
                      <tr key={source.source} className="border-b border-slate-50 last:border-0">
                        <td className="px-4 py-3 font-medium capitalize">{source.source}</td>
                        {source.dropoffs.map((drop, i) => (
                          <td key={i} className="px-4 py-3">
                            <div className="w-full h-8 rounded flex items-center justify-center text-xs font-semibold" style={{ backgroundColor: getHeatmapColor(drop), color: drop > 50 ? '#7F1D1D' : '#1E293B' }}>
                              {Math.round(drop)}%
                            </div>
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="mt-6 flex items-center justify-center gap-4 text-xs text-slate-500">
                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-[#BBF7D0]"></div> Low Drop</div>
                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-[#FEF08A]"></div> Med Drop</div>
                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded bg-[#FECACA]"></div> High Drop</div>
              </div>
            </Card>
          </div>

          <Card className="p-0 overflow-hidden">
            <div className="p-6 border-b border-slate-100">
              <h3 className="font-bold text-slate-900">Lead Source Breakdown</h3>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-100">
                  <tr>
                    <th className="px-6 py-4 font-semibold">Source</th>
                    <th className="px-6 py-4 font-semibold">Total Leads</th>
                    <th className="px-6 py-4 font-semibold">Qualified</th>
                    <th className="px-6 py-4 font-semibold">Won</th>
                    <th className="px-6 py-4 font-semibold">Win Rate</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {sourceData.map((data) => (
                    <tr key={data.source} className="hover:bg-slate-50 transition-colors">
                      <td className="px-6 py-4 font-semibold text-slate-900 capitalize">{data.source}</td>
                      <td className="px-6 py-4 text-slate-600">{data.total}</td>
                      <td className="px-6 py-4 text-slate-600">{data.qualified}</td>
                      <td className="px-6 py-4 font-medium text-slate-900">{data.won}</td>
                      <td className="px-6 py-4">
                        <div className="flex items-center gap-2 w-full max-w-[120px]">
                          <span className="font-semibold">{data.rate}%</span>
                          <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-slate-900 rounded-full" style={{ width: `${data.rate}%` }}></div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {sourceData.length === 0 && (
                    <tr><td colSpan={5} className="px-6 py-8 text-center text-slate-500 italic">No lead data found for the selected dates.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    }

    // ============================================================================
    // INITIALIZATION
    // ============================================================================

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
